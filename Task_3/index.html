<!DOCTYPE html>
<html>
<head>
    <title>Advanced Tic Tac Toe</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #c3ecf7, #a1c4fd);
            margin: 0;
            padding-top: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            color: #333;
        }

        .mode-select {
            margin-top: 15px;
        }

        select {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .cell {
            width: 110px;
            height: 110px;
            background: white;
            font-size: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            transition: 0.2s;
            font-family: 'Orbitron', sans-serif;
        }

        .cell:hover {
            transform: scale(1.05);
            background: #f0f8ff;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 600;
            color: #444;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            font-weight: 600;
        }

        button:hover {
            background: #357abd;
        }
    </style>
</head>

<body>

<h1>TIC TAC TOE</h1>

<div class="mode-select">
    <label><b>Select Mode:</b></label>
    <select id="mode">
        <option value="ai">Play with AI</option>
        <option value="friend">Play with Friend</option>
    </select>
</div>

<div class="board" id="board"></div>

<div id="status">Player X's Turn</div>
<button onclick="resetGame()">Reset Game</button>

<script>
    let board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameActive = true;

    const boardElement = document.getElementById("board");
    const statusText = document.getElementById("status");
    const modeSelect = document.getElementById("mode");

    const winningCombinations = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    // Create board
    board.forEach((_, index) => {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.addEventListener("click", () => handleClick(index));
        boardElement.appendChild(cell);
    });

    function handleClick(index) {
        if (board[index] !== "" || !gameActive) return;

        board[index] = currentPlayer;
        boardElement.children[index].innerText = currentPlayer;

        if (checkWinner(currentPlayer)) {
            statusText.innerText = "Player " + currentPlayer + " Wins! 🎉";
            gameActive = false;
            return;
        }

        if (!board.includes("")) {
            statusText.innerText = "It's a Draw!";
            gameActive = false;
            return;
        }

        if (modeSelect.value === "ai" && currentPlayer === "X") {
            currentPlayer = "O";
            statusText.innerText = "AI Thinking...";
            setTimeout(aiMove, 500);
        } else {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = "Player " + currentPlayer + "'s Turn";
        }
    }

    function aiMove() {
        let emptyCells = board
            .map((val, idx) => val === "" ? idx : null)
            .filter(val => val !== null);

        if (emptyCells.length === 0) return;

        let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];

        board[randomIndex] = "O";
        boardElement.children[randomIndex].innerText = "O";

        if (checkWinner("O")) {
            statusText.innerText = "AI Wins 🤖";
            gameActive = false;
            return;
        }

        if (!board.includes("")) {
            statusText.innerText = "It's a Draw!";
            gameActive = false;
            return;
        }

        currentPlayer = "X";
        statusText.innerText = "Player X's Turn";
    }

    function checkWinner(player) {
        return winningCombinations.some(combo =>
            combo.every(index => board[index] === player)
        );
    }

    function resetGame() {
        board = ["", "", "", "", "", "", "", "", ""];
        currentPlayer = "X";
        gameActive = true;
        statusText.innerText = "Player X's Turn";
        Array.from(boardElement.children).forEach(cell => cell.innerText = "");
    }
</script>

</body>
</html>
